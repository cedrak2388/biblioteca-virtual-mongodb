<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Perfil</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="form-page">

    <div class="form-card">

        <h1>👤 Meu Perfil</h1>
        <p class="subtext">Atualize suas informações pessoais</p>

        <form id="formPerfil">

            <input
                type="text"
                id="nome"
                placeholder="Nome completo"
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                disabled
            >

            <input
                type="text"
                id="telefone"
                placeholder="Telefone"
            >

            <input
                type="text"
                id="endereco"
                placeholder="Endereço"
            >

            <button type="submit">
                Salvar Alterações
            </button>

        </form>

        <button class="secondary" onclick="window.location.href='leitor.html'">
            Voltar
        </button>

    </div>

</div>

<script src="js/meu-perfil.js"></script>

</body>

</html>
