<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Virtual</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="cadastro-link">
        <a href="cadastro.html">Cadastre-se</a>
    </div>

    <div class="container">

        <h1>Biblioteca Virtual</h1>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        <a href="#">
            Esqueceu sua senha?
        </a>

        <p id="mensagem"></p>

    </div>

    <script src="js/login.js"></script>

</body>
</html>
