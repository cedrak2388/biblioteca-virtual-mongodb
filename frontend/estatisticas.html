<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h2>📚 Biblioteca</h2>

        <p id="usuarioLogado"></p>

        <nav class="menu">

            <button onclick="location.href='admin.html'">Dashboard</button>
            <button onclick="location.href='usuarios.html'">Usuários</button>
            <button onclick="location.href='livros.html'">Livros</button>
            <button onclick="location.href='estatisticas.html'">Estatísticas</button>
            <button onclick="location.href='solicitacoes-exclusao.html'">Exclusões</button>

            <button class="logout" onclick="location.href='login.html'">Sair</button>

        </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="main-content">

        <h1>📊 Estatísticas da Biblioteca</h1>
        <p class="subtext">Análise geral do sistema</p>

        <!-- GRID PRINCIPAL -->
        <div class="stats-grid">

            <section class="stats-card">
                <h3>📚 Livros por Categoria</h3>
                <div id="categorias"></div>
            </section>

            <section class="stats-card">
                <h3>⭐ Top 5 Livros</h3>
                <div id="avaliacoes"></div>
            </section>

            <section class="stats-card">
                <h3>👥 Usuários por Status</h3>
                <div id="usuariosStatus"></div>
            </section>

            <section class="stats-card">
                <h3>📦 Total de Reservas</h3>
                <div id="reservas"></div>
            </section>

            <section class="stats-card">
                <h3>📦 Indicadores Gerais</h3>
                <div id="reservas">
                    <p>
        Total de Empréstimos:
        <strong id="totalEmprestimos">
            0
        </strong>
    </p>

    <p>
        Total de Devoluções:
        <strong id="totalDevolucoes">
            0
        </strong>
    </p>

    <p>
        Total de Avaliações:
        <strong id="totalAvaliacoes">
            0
        </strong>
    </p>
                </div>
            </section>

            <section class="stats-card">
                <h3>📦 Livro Mais Emprestado</h3>
                <div id="maisEmprestado"></div>
            </section>

            <section class="stats-card">
                <h3>📦 Livro Mais Reservado</h3>
                <div id="maisReservado"></div>
            </section>

        </div>

    </main>

</div>

<script src="js/proteger-admin.js"></script>
<script src="js/estatisticas.js"></script>
<script src="js/cabecalho-admin.js"></script>

</body>
</html>
