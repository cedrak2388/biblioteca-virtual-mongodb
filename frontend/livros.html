<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerenciar Livros</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/tables.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="admin-layout">

    <aside class="sidebar">

        <div class="sidebar-header">

            <h2>📚 Biblioteca</h2>

            <p id="usuarioLogado"></p>

        </div>

        <nav class="menu">

            <button onclick="location.href='admin.html'">
                Dashboard
            </button>

            <button onclick="location.href='usuarios.html'">
                Usuários
            </button>

            <button onclick="location.href='livros.html'">
                Livros
            </button>

            <button onclick="location.href='estatisticas.html'">
                Estatísticas
            </button>

            <button onclick="location.href='solicitacoes-exclusao.html'">
                Exclusões
            </button>

            <button class="logout" onclick="location.href='login.html'">
                Sair
            </button>

        </nav>

    </aside>

    <main class="main-content">

        <div class="page-header">

            <h1>📖 Gerenciar Livros</h1>

            <p class="subtext">
                Cadastre, edite e consulte o acervo da biblioteca
            </p>

        </div>

        <div class="actions-bar">

            <button
                class="primary"
                onclick="abrirFormulario()">

                + Novo Livro

            </button>

        </div>

        <div class="search-bar">

            <input
                type="text"
                id="campoBusca"
                placeholder="Pesquisar por título"
            >

            <input
                type="text"
                id="campoTag"
                placeholder="Pesquisar por categoria ou tag"
            >

            <button onclick="buscarPorTag()">
                Buscar Tag
            </button>

            <button onclick="buscarLivros()">
                Buscar
            </button>

            <button onclick="carregarLivros()">
                Mostrar Todos
            </button>

        </div>

        <div class="table-container">

            <table class="table">

                <thead>

                    <tr>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>ISBN</th>
                        <th>Categorias</th>
                        <th>Disponíveis</th>
                        <th>Estoque</th>
                        <th>Média</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="tabelaLivros"></tbody>

            </table>

        </div>

    </main>

</div>

<script src="js/proteger-admin.js"></script>
<script src="js/livros.js"></script>
<script src="js/cabecalho-admin.js"></script>

</body>
</html>
