<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Gerenciar Livros</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/cards.css">

</head>

<body>

<div class="container">

<div class="topo-sistema">

    <h2>Biblioteca Virtual</h2>

    <div id="usuarioLogado"></div>

    <div class="menu-sistema">

        <button onclick="location.href='admin.html'">
            Dashboard
        </button>

        <button onclick="location.href='usuarios.html'">
            Usuários
        </button>

        <button onclick="location.href='livros.html'">
            Livros
        </button>

        <button onclick="location.href='estatisticas.html'">
            Estatísticas
        </button>

        <button onclick="location.
        href='solicitacoes-exclusao.html'">
            Exclusões
        </button>
        
        <button onclick="location.href='login.html'">
            Logout
        </button>

    </div>

</div>

<h1>Gerenciar Livros</h1>

<button onclick="abrirFormulario()">
Novo Livro
</button>

<br><br>

<input
    type="text"
    id="campoBusca"
    placeholder="Pesquisar por título"
>

<input
    type="text"
    id="campoTag"
    placeholder="Pesquisar por tag"
>

<button onclick="buscarPorTag()">
    Buscar Tag
</button>

<br><br>

<button onclick="buscarLivros()">
    Buscar
</button>

<button onclick="carregarLivros()">
    Mostrar Todos
</button>

<br><br>

<table border="1" width="100%">

<thead>

<tr>

<th>Título</th>

<th>Autor</th>

<th>ISBN</th>

<th>Categorias</th>

<th>Disponíveis</th>

<th>Estoque</th>

<th>Média</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="tabelaLivros">

</tbody>

</table>

<br>

</div>

<script src="js/proteger-admin.js"></script>
<script src="js/livros.js"></script>
<script src="js/cabecalho-admin.js"></script>

</body>
</html>
