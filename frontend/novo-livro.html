<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Livro</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>Cadastrar Livro</h1>

    <form id="livroForm">

        <input type="text" id="titulo" placeholder="Título" required>

        <input type="text" id="autorNome" placeholder="Autor" required>

        <input type="text" id="autorPais" placeholder="País do Autor" required>

        <input type="text" id="isbn" placeholder="ISBN" required>

        <input type="text" id="categorias"
            placeholder="Fantasia,Aventura">

        <input type="text" id="tags"
            placeholder="aventura,fantasia,dragao">

        <textarea
            id="descricao"
            placeholder="Descrição"
            rows="4"
            style="width:100%; margin-bottom:15px;"
        ></textarea>

        <input type="number"
            id="anoPublicacao"
            placeholder="Ano de Publicação">

        <input type="text"
            id="editora"
            placeholder="Editora">

        <input type="text"
            id="idioma"
            placeholder="Idioma">

        <input type="number"
            id="paginas"
            placeholder="Número de Páginas">

        <input type="number"
            id="estoque"
            placeholder="Estoque">

        <button type="submit">
            Salvar Livro
        </button>

    </form>

    <p id="mensagem"></p>

    <br>

    <button onclick="voltar()">
        Voltar
    </button>

</div>

<script src="js/novo-livro.js"></script>

</body>
</html>
