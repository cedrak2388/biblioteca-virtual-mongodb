<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Novo Livro</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/forms.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="form-page">

    <div class="form-card">

        <div class="form-header">

            <h1>📚 Cadastrar Livro</h1>

            <p class="subtext">
                Adicione um novo livro ao acervo da biblioteca
            </p>

        </div>

        <form id="livroForm">

            <div class="grid-2">

                <input type="text" id="titulo" placeholder="Título" required>
                <input type="text" id="autorNome" placeholder="Autor" required>

                <input type="text" id="autorPais" placeholder="País do Autor" required>
                <input type="text" id="isbn" placeholder="ISBN" required>

                <input type="text" id="categorias" placeholder="Categorias (ex: Fantasia,Aventura)">
                <input type="text" id="tags" placeholder="Tags (ex: dragão, magia)">

                <input type="number" id="anoPublicacao" placeholder="Ano de Publicação">
                <input type="text" id="editora" placeholder="Editora">

                <input type="text" id="idioma" placeholder="Idioma">
                <input type="number" id="paginas" placeholder="Número de Páginas">

                <input type="number" id="estoque" placeholder="Estoque">

            </div>

            <textarea
                id="descricao"
                placeholder="Descrição do livro"
                rows="5">
            </textarea>

            <button type="submit">
                Salvar Livro
            </button>

        </form>

        <p id="mensagem"></p>

        <button
            class="secondary"
            onclick="voltar()">

            Voltar

        </button>

    </div>

</div>

<script src="js/novo-livro.js"></script>

</body>

</html>
