<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Biblioteca Virtual</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="auth-page">

        <div class="auth-left">
            <h1>📚 Biblioteca Virtual</h1>
            <p>Crie sua conta para acessar livros, reservas e empréstimos de forma simples e organizada.</p>
        </div>

        <div class="auth-right">

            <div class="auth-card">

                <h2>Criar Conta</h2>
                <p class="subtext">Preencha os dados abaixo</p>

                <form id="cadastroForm">

                    <input
                        type="text"
                        id="nome"
                        placeholder="Nome completo"
                        required
                    >

                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required
                    >

                    <input
                        type="password"
                        id="senha"
                        placeholder="Senha"
                        required
                    >

                    <input
                        type="password"
                        id="confirmarSenha"
                        placeholder="Confirmar senha"
                        required
                    >

                    <button type="submit">
                        Cadastrar
                    </button>

                </form>

                <p id="mensagem"></p>

                <div class="auth-footer">
                    <span>Já tem conta?</span>
                    <a href="login.html">Entrar</a>
                </div>

            </div>

        </div>

    </div>

    <script src="js/cadastro.js"></script>

</body>
</html>
