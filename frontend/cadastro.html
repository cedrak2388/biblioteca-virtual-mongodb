<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>Cadastro de Usuário</h1>

        <form id="cadastroForm">

            <input
                type="text"
                id="nome"
                placeholder="Nome"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
            >

            <input
                type="password"
                id="confirmarSenha"
                placeholder="Confirmar Senha"
                required
            >

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <p id="mensagem"></p>

        <br>

        <a href="login.html">
            Voltar para Login
        </a>

    </div>

    <script src="js/cadastro.js"></script>

</body>
</html>
